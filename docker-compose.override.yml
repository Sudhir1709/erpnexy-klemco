services:
  backend:
    entrypoint:
      - bash
      - -c
      - |
        source /home/frappe/frappe-bench/env/bin/activate
        python -c "import india_compliance" 2>/dev/null || \
          bench get-app india_compliance https://github.com/resilient-tech/india-compliance --branch version-16-hotfix --skip-assets
        python -c "import hrms" 2>/dev/null || \
          bench get-app hrms https://github.com/frappe/hrms --branch version-16 --skip-assets
        python -c "import crm" 2>/dev/null || \
          bench get-app crm https://github.com/frappe/crm --branch main --skip-assets
        for APP in india_compliance hrms crm; do
          SRC=/home/frappe/frappe-bench/apps/$APP/$APP/public
          DEST=/home/frappe/frappe-bench/sites/assets/$APP
          if [ -d "$SRC" ] && [ ! -f "$DEST/assets_copied" ]; then
            rm -rf $DEST && cp -r $SRC $DEST && touch $DEST/assets_copied
          fi
        done
        exec /home/frappe/frappe-bench/env/bin/gunicorn \
          --chdir=/home/frappe/frappe-bench/sites \
          --bind=0.0.0.0:8000 --threads=4 --workers=2 \
          --worker-class=gthread --worker-tmp-dir=/dev/shm \
          --timeout=120 --preload frappe.app:application

  queue-short:
    entrypoint:
      - bash
      - -c
      - |
        source /home/frappe/frappe-bench/env/bin/activate
        python -c "import india_compliance" 2>/dev/null || \
          bench get-app india_compliance https://github.com/resilient-tech/india-compliance --branch version-16-hotfix --skip-assets
        python -c "import hrms" 2>/dev/null || \
          bench get-app hrms https://github.com/frappe/hrms --branch version-16 --skip-assets
        python -c "import crm" 2>/dev/null || \
          bench get-app crm https://github.com/frappe/crm --branch main --skip-assets
        exec bench worker --queue short,default

  queue-long:
    entrypoint:
      - bash
      - -c
      - |
        source /home/frappe/frappe-bench/env/bin/activate
        python -c "import india_compliance" 2>/dev/null || \
          bench get-app india_compliance https://github.com/resilient-tech/india-compliance --branch version-16-hotfix --skip-assets
        python -c "import hrms" 2>/dev/null || \
          bench get-app hrms https://github.com/frappe/hrms --branch version-16 --skip-assets
        python -c "import crm" 2>/dev/null || \
          bench get-app crm https://github.com/frappe/crm --branch main --skip-assets
        exec bench worker --queue long,default,short

  scheduler:
    entrypoint:
      - bash
      - -c
      - |
        source /home/frappe/frappe-bench/env/bin/activate
        python -c "import india_compliance" 2>/dev/null || \
          bench get-app india_compliance https://github.com/resilient-tech/india-compliance --branch version-16-hotfix --skip-assets
        python -c "import hrms" 2>/dev/null || \
          bench get-app hrms https://github.com/frappe/hrms --branch version-16 --skip-assets
        python -c "import crm" 2>/dev/null || \
          bench get-app crm https://github.com/frappe/crm --branch main --skip-assets
        exec bench schedule

  websocket:
    entrypoint:
      - bash
      - -c
      - |
        exec node /home/frappe/frappe-bench/apps/frappe/socketio.js
