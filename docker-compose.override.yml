x-ic-install: &ic_install
  entrypoint:
    - bash
    - -c
    - |
      source /home/frappe/frappe-bench/env/bin/activate
      if ! python -c "import india_compliance" 2>/dev/null; then
        echo "[init] Installing india_compliance..."
        bench get-app india_compliance https://github.com/resilient-tech/india-compliance --branch version-16 --skip-assets 2>/dev/null || true
      fi

services:
  backend:
    <<: *ic_install
    entrypoint:
      - bash
      - -c
      - |
        source /home/frappe/frappe-bench/env/bin/activate
        python -c "import india_compliance" 2>/dev/null || \
          bench get-app india_compliance https://github.com/resilient-tech/india-compliance --branch version-16 --skip-assets
        exec /home/frappe/frappe-bench/env/bin/gunicorn \
          --chdir=/home/frappe/frappe-bench/sites \
          --bind=0.0.0.0:8000 --threads=4 --workers=2 \
          --worker-class=gthread --worker-tmp-dir=/dev/shm \
          --timeout=120 --preload frappe.app:application

  queue-short:
    entrypoint:
      - bash
      - -c
      - |
        source /home/frappe/frappe-bench/env/bin/activate
        python -c "import india_compliance" 2>/dev/null || \
          bench get-app india_compliance https://github.com/resilient-tech/india-compliance --branch version-16 --skip-assets
        exec bench worker --queue short,default

  queue-long:
    entrypoint:
      - bash
      - -c
      - |
        source /home/frappe/frappe-bench/env/bin/activate
        python -c "import india_compliance" 2>/dev/null || \
          bench get-app india_compliance https://github.com/resilient-tech/india-compliance --branch version-16 --skip-assets
        exec bench worker --queue long,default,short

  scheduler:
    entrypoint:
      - bash
      - -c
      - |
        source /home/frappe/frappe-bench/env/bin/activate
        python -c "import india_compliance" 2>/dev/null || \
          bench get-app india_compliance https://github.com/resilient-tech/india-compliance --branch version-16 --skip-assets
        exec bench schedule

  websocket:
    entrypoint:
      - bash
      - -c
      - |
        exec node /home/frappe/frappe-bench/apps/frappe/socketio.js
